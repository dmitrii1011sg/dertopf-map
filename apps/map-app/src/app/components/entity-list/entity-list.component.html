<app-sidebar-layout-sections>
  <app-sidebar-layout-section-header>
    <dt-page-title title="{{ currentType() | titlecase }}">
      <button mat-flat-button class="back" [routerLink]="['..']">
        <fa-icon [icon]="icons.back"> </fa-icon>
      </button>
    </dt-page-title>
  </app-sidebar-layout-section-header>

  <app-sidebar-layout-section-content>
    <section style="padding: 16px">
      <mat-accordion multi="false" class="entity-accordion">
        @for (entity of currentEntities(); track entity.id) {
          <mat-expansion-panel hideToggle>
            <mat-expansion-panel-header>
              <mat-panel-title>
                <span class="entity-name">{{ entity.name }}</span>
              </mat-panel-title>
              <mat-panel-description>
                ID: {{ entity.id.split('-')[1] }}
              </mat-panel-description>
            </mat-expansion-panel-header>

            <div class="entity-details">
              <p class="description">
                {{ entity.description || 'No description provided.' }}
              </p>

              <div class="actions">
                <button
                  mat-flat-button
                  class="showhide"
                  [title]="entity.isVisible ? 'Hide' : 'Show'"
                  (click)="onToggleVisibility(entity.id, $event)"
                >
                  <fa-icon
                    [icon]="entity.isVisible ? icons.show : icons.hide"
                    [class.text-blue-500]="entity.isVisible"
                  >
                  </fa-icon>
                </button>

                <button
                  mat-flat-button
                  class="edit"
                  [disabled]="true"
                  title="Edit"
                >
                  <fa-icon [icon]="icons.edit" class="text-gray-600"></fa-icon>
                </button>

                <button
                  mat-flat-button
                  class="delete"
                  title="Delete"
                  (click)="confirmDelete(entity)"
                >
                  <fa-icon [icon]="icons.delete" class="text-red-500"></fa-icon>
                </button>
              </div>
            </div>
          </mat-expansion-panel>
        } @empty {
          <div>Empty</div>
        }
      </mat-accordion>
    </section>
  </app-sidebar-layout-section-content>
</app-sidebar-layout-sections>

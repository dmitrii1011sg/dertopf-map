<div class="dt-dialog-container">
  <div class="dialog-header">
    <fa-icon [icon]="icons.warning" [class.danger]="data.isDanger"></fa-icon>
    <h3>{{ data.title }}</h3>
  </div>

  <div class="dialog-body">
    <p>{{ data.message }}</p>
  </div>

  <div class="dialog-footer">
    <button class="btn-secondary" (click)="onCancel()">
      {{ data.cancelText || 'Cancel' }}
    </button>

    <button
      [class]="data.isDanger ? 'btn-danger' : 'btn-primary'"
      (click)="onConfirm()"
    >
      {{ data.confirmText || 'Ok' }}
    </button>
  </div>
</div>

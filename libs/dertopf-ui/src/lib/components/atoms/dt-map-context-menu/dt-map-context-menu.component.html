@if (state(); as menuState) {
  <div
    class="dt-context-menu"
    [style.left.px]="menuState.x"
    [style.top.px]="menuState.y"
    [class.invert-x]="shouldInvertX()"
    [class.invert-y]="shouldInvertY()"
    (contextmenu)="$event.preventDefault()"
  >
    @if (menuState.entity; as entity) {
      <div class="menu-header">
        Object:
        <span class="highlight">{{ entity.name || 'None' }}</span>
      </div>
      <button class="menu-action" (click)="hide.emit(entity)">
        <fa-icon [icon]="icons.hide"></fa-icon> Hide Object
      </button>
    }

    @if (menuState.worldPosition; as pos) {
      <div class="menu-header">Info</div>

      <button class="menu-action" (click)="addPoint.emit(pos)">
        <fa-icon [icon]="icons.add"></fa-icon> Add Point
      </button>

      <button class="menu-action" (click)="copyCoordinates(pos)">
        <fa-icon [icon]="icons.copy"></fa-icon> Copy Coordinates
      </button>
      <button
        class="menu-action close"
        (click)="openInGoogleMaps(menuState.worldPosition)"
      >
        <fa-icon [icon]="icons.google"></fa-icon> Open in GMaps
      </button>
    }
  </div>
}

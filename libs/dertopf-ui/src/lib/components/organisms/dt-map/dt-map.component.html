<div class="map-container">
  <dt-map-view></dt-map-view>

  <dt-map-editor></dt-map-editor>

  <div class="map-buttons">
    <dt-map-button
      class="map-home-btn"
      [icon]="icons.home"
      tooltip="Fly to Home"
      (mapClick)="flyToHome()"
    ></dt-map-button>
  </div>

  <dt-map-context-menu
    [state]="contextMenuState()"
    (addPoint)="createPoint($event)"
    (hide)="hideEntity($event)"
  >
  </dt-map-context-menu>

  <dt-map-coords class="dt-coords"></dt-map-coords>
  <dt-map-compass class="dt-compass"></dt-map-compass>
</div>
